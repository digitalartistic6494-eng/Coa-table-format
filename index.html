<!DOCTYPE html>
<html>
<head>
  <title>QC Sample Summary</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
      color: #1f2933;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      background: #ffffff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
    }

    .header {
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 16px;
      margin-bottom: 22px;
    }

    .header h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.3px;
      color: #111827;
    }

    .header p {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .input-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    textarea {
      width: 100%;
      height: 260px;
      padding: 14px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      resize: vertical;
      background: #ffffff;
      outline: none;
      line-height: 1.45;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    .copy-btn {
      background: #111827;
      color: white;
    }

    .copy-btn:hover {
      background: #374151;
    }

    .clear-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .clear-btn:hover {
      background: #d1d5db;
    }

    #summary {
      margin-top: 24px;
      overflow-x: auto;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      font-size: 13px;
      min-width: 850px;
      border: 1px solid #d1d5db;
    }

    th {
      background: #111827;
      color: white;
      padding: 11px 10px;
      text-align: left;
      font-weight: 600;
      border: 1px solid #111827;
      letter-spacing: 0.2px;
    }

    td {
      padding: 10px;
      border: 1px solid #d1d5db;
      vertical-align: top;
      color: #1f2933;
    }

    tr:nth-child(even) td {
      background: #f9fafb;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      body {
        padding: 15px;
      }

      .container {
        padding: 18px;
      }

      .header h2 {
        font-size: 22px;
      }

      textarea {
        height: 230px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h2>QC Sample Summary</h2>
      <p>Paste received sample details below. The summary table will be created automatically.</p>
    </div>

    <div class="input-box">
      <textarea id="rawText" placeholder="Paste details here..."></textarea>

      <div class="actions">
        <button class="copy-btn" onclick="copySummary()">Copy Table</button>
        <button class="clear-btn" onclick="clearPage()">Clear</button>
      </div>

      <div class="note">
        Copy the table and paste directly into email body.
      </div>
    </div>

    <div id="summary"></div>

  </div>

<script>
const rawText = document.getElementById("rawText");
const summary = document.getElementById("summary");

rawText.addEventListener("input", buildSummary);
rawText.addEventListener("paste", function () {
  setTimeout(buildSummary, 100);
});

function buildSummary() {
  const text = rawText.value.trim();

  if (!text) {
    summary.innerHTML = "";
    return;
  }

  const lines = text
    .split(/\n/)
    .map(line => line.trim())
    .filter(line => line.length > 0);

  const records = [];

  for (let i = 0; i < lines.length; i++) {
    if (!/^QR/i.test(lines[i])) continue;

    const qcTrace = lines[i];
    const section = lines.slice(i + 1, i + 35);

    const material = section.find(line => line.includes(" - ")) || "";
    const quantity = section.find(line => /^[\d,]+(\.\d+)?\s*\([A-Z]+\)$/i.test(line)) || "";

    let supplier = "";
    const qtyPos = section.indexOf(quantity);
    if (qtyPos >= 0 && section[qtyPos + 1]) {
      supplier = section[qtyPos + 1];
    }

    let vendorLot = "";
    const datePos = section.findIndex(line => /^\d{4}\/\d{2}\/\d{2}/.test(line));
    if (datePos >= 0 && section[datePos + 1]) {
      vendorLot = section[datePos + 1];
    }

    records.push([qcTrace, material, quantity, supplier, vendorLot]);
  }

  if (records.length === 0) {
    summary.innerHTML = "";
    return;
  }

  let table = `
    <table id="sampleTable">
      <tr>
        <th>QC TRACE</th>
        <th>MATERIAL</th>
        <th>RECEIVED QUANTITY</th>
        <th>SUPPLIER</th>
        <th>VENDOR LOT</th>
      </tr>
  `;

  records.forEach(row => {
    table += "<tr>";
    row.forEach(value => {
      table += `<td>${clean(value)}</td>`;
    });
    table += "</tr>";
  });

  table += "</table>";
  summary.innerHTML = table;
}

function copySummary() {
  const table = document.getElementById("sampleTable");

  if (!table) {
    alert("Paste the sample details first.");
    return;
  }

  const range = document.createRange();
  range.selectNode(table);

  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);

  document.execCommand("copy");
  selection.removeAllRanges();

  alert("Copied. Paste it into your email.");
}

function clearPage() {
  rawText.value = "";
  summary.innerHTML = "";
}

function clean(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
</script>

</body>
</html>
