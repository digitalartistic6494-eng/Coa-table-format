<!DOCTYPE html>
<html>
<head>
  <title>QC Trace Filter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 260px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }

    button {
      margin: 10px 5px 10px 0;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      background: #0078d4;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #005fa3;
    }

    #output {
      margin-top: 15px;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    th {
      border: 1px solid #000;
      padding: 8px;
      background: #d9eaf7;
      text-align: left;
      font-weight: bold;
    }

    td {
      border: 1px solid #000;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
  </style>
</head>

<body>

  <h2>QC Trace Data Filter</h2>

  <p>Paste full sample received data below:</p>

  <textarea id="inputData" placeholder="Paste data here..."></textarea>

  <br>

  <button onclick="filterData()">Filter 5 Columns</button>
  <button onclick="copyEmailTable()">Copy Table With Borders</button>
  <button onclick="clearAll()">Clear</button>

  <div id="output"></div>

<script>
function filterData() {
  let text = document.getElementById("inputData").value;
  let lines = text.split(/\n/).map(x => x.trim()).filter(x => x !== "");

  let rows = [];

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith("QR")) {
      let qcTrace = lines[i];
      let material = "";
      let receivedQty = "";
      let supplier = "";
      let vendorLot = "";

      for (let j = i + 1; j < Math.min(i + 25, lines.length); j++) {
        if (lines[j].includes(" - ")) {
          material = lines[j];
          break;
        }
      }

      for (let j = i + 1; j < Math.min(i + 25, lines.length); j++) {
        if (/^[\d,]+(\.\d+)?\s*\([A-Z]+\)$/.test(lines[j])) {
          receivedQty = lines[j];
          break;
        }
      }

      let qtyIndex = lines.indexOf(receivedQty);
      if (qtyIndex !== -1 && lines[qtyIndex + 1]) {
        supplier = lines[qtyIndex + 1];
      }

      for (let j = i + 1; j < Math.min(i + 35, lines.length); j++) {
        if (/^\d{4}\/\d{2}\/\d{2}/.test(lines[j])) {
          vendorLot = lines[j + 1] || "";
          break;
        }
      }

      rows.push([qcTrace, material, receivedQty, supplier, vendorLot]);
    }
  }

  let html = `
    <table id="resultTable">
      <tr>
        <th>QC TRACE</th>
        <th>MATERIAL</th>
        <th>RECEIVED QUANTITY</th>
        <th>SUPPLIER</th>
        <th>VENDOR LOT</th>
      </tr>
  `;

  rows.forEach(row => {
    html += "<tr>";
    row.forEach(col => {
      html += `<td>${escapeHtml(col)}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("output").innerHTML = html;
}

function copyEmailTable() {
  let table = document.getElementById("resultTable");

  if (!table) {
    alert("Please filter data first.");
    return;
  }

  let range = document.createRange();
  range.selectNode(table);

  let selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);

  try {
    document.execCommand("copy");
    alert("Copied table with borders! Paste into Outlook/Gmail email body.");
  } catch (err) {
    alert("Copy failed. Please manually select the table and copy.");
  }

  selection.removeAllRanges();
}

function clearAll() {
  document.getElementById("inputData").value = "";
  document.getElementById("output").innerHTML = "";
}

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
