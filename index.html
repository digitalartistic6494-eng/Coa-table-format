<!DOCTYPE html>
<html>
<head>
  <title>QC Trace Filter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    textarea {
      width: 100%;
      height: 260px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      margin: 10px 5px 10px 0;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      background: #0078d4;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #005fa3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 15px;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    th {
      border: 1px solid #000;
      padding: 8px;
      background: #d9eaf7;
      text-align: left;
    }

    td {
      border: 1px solid #000;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
  </style>
</head>

<body>

  <h2>QC Trace Data Filter</h2>

  <p>Paste full sample received data below:</p>

  <textarea id="inputData" placeholder="Paste data here..."></textarea>

  <br>

  <button onclick="filterData()">Filter 5 Columns</button>
  <button onclick="copyEmailTable()">Copy Email Table</button>
  <button onclick="clearAll()">Clear</button>

  <div id="output"></div>

<script>
function filterData() {
  let text = document.getElementById("inputData").value;
  let lines = text.split(/\n/).map(x => x.trim()).filter(x => x !== "");

  let rows = [];

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith("QR")) {
      let qcTrace = lines[i];
      let material = "";
      let receivedQty = "";
      let supplier = "";
      let vendorLot = "";

      for (let j = i + 1; j < Math.min(i + 20, lines.length); j++) {
        if (lines[j].includes(" - ")) {
          material = lines[j];
          break;
        }
      }

      for (let j = i + 1; j < Math.min(i + 20, lines.length); j++) {
        if (/^[\d,]+(\.\d+)?\s*\([A-Z]+\)$/.test(lines[j])) {
          receivedQty = lines[j];
          break;
        }
      }

      let qtyIndex = lines.indexOf(receivedQty);
      if (qtyIndex !== -1 && lines[qtyIndex + 1]) {
        supplier = lines[qtyIndex + 1];
      }

      for (let j = i + 1; j < Math.min(i + 30, lines.length); j++) {
        if (/^\d{4}\/\d{2}\/\d{2}/.test(lines[j])) {
          vendorLot = lines[j + 1] || "";
          break;
        }
      }

      rows.push([qcTrace, material, receivedQty, supplier, vendorLot]);
    }
  }

  let html = `
    <table id="resultTable">
      <tr>
        <th>QC TRACE</th>
        <th>MATERIAL</th>
        <th>RECEIVED QUANTITY</th>
        <th>SUPPLIER</th>
        <th>VENDOR LOT</th>
      </tr>
  `;

  rows.forEach(row => {
    html += "<tr>";
    row.forEach(col => {
      html += `<td>${col}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("output").innerHTML = html;
}

function copyEmailTable() {
  let table = document.getElementById("resultTable");

  if (!table) {
    alert("Please filter data first.");
    return;
  }

  let html = `
  <table style="border-collapse:collapse; width:100%; font-family:Arial, sans-serif; font-size:13px;">
    <tr style="background:#d9eaf7; font-weight:bold;">
      <th style="border:1px solid #000; padding:8px; text-align:left;">QC TRACE</th>
      <th style="border:1px solid #000; padding:8px; text-align:left;">MATERIAL</th>
      <th style="border:1px solid #000; padding:8px; text-align:left;">RECEIVED QUANTITY</th>
      <th style="border:1px solid #000; padding:8px; text-align:left;">SUPPLIER</th>
      <th style="border:1px solid #000; padding:8px; text-align:left;">VENDOR LOT</th>
    </tr>
  `;

  for (let i = 1; i < table.rows.length; i++) {
    html += "<tr>";
    for (let cell of table.rows[i].cells) {
      html += `<td style="border:1px solid #000; padding:8px; text-align:left; vertical-align:top;">${cell.innerText}</td>`;
    }
    html += "</tr>";
  }

  html += "</table>";

  let plainText = "";
  for (let row of table.rows) {
    let cells = Array.from(row.cells).map(cell => cell.innerText);
    plainText += cells.join("\t") + "\n";
  }

  navigator.clipboard.write([
    new ClipboardItem({
      "text/html": new Blob([html], { type: "text/html" }),
      "text/plain": new Blob([plainText], { type: "text/plain" })
    })
  ]).then(() => {
    alert("Copied! Paste into Outlook or Gmail.");
  }).catch(() => {
    alert("Copy failed. Please select the table manually and copy.");
  });
}

function clearAll() {
  document.getElementById("inputData").value = "";
  document.getElementById("output").innerHTML = "";
}
</script>

</body>
</html>
