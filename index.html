<!DOCTYPE html>
<html>
<head>
  <title>QC Sample Summary</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f4;
      color: #222;
    }

    h2 {
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 260px;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #bbb;
      border-radius: 4px;
      box-sizing: border-box;
      resize: vertical;
      background: #fff;
    }

    button {
      margin-top: 12px;
      margin-right: 6px;
      padding: 9px 16px;
      font-size: 14px;
      border: 1px solid #999;
      border-radius: 4px;
      background: #e9e9e9;
      cursor: pointer;
    }

    button:hover {
      background: #ddd;
    }

    .copy-msg {
      font-size: 13px;
      color: green;
      font-weight: bold;
      margin-left: 8px;
    }

    #summary {
      margin-top: 15px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #333;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #e6eef7;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>QC Sample Summary</h2>
  <p>Paste received sample details below.</p>

  <textarea id="rawText" placeholder="Paste details here..."></textarea>

  <br>

  <button onclick="copySummary()">Copy Table</button>
  <button onclick="clearPage()">Clear</button>
  <span id="copyMsg" class="copy-msg"></span>

  <div id="summary"></div>

<script>
const rawText = document.getElementById("rawText");
const summary = document.getElementById("summary");

rawText.addEventListener("input", buildSummary);
rawText.addEventListener("paste", function () {
  setTimeout(buildSummary, 100);
});

function buildSummary() {
  const text = rawText.value.trim();

  if (!text) {
    summary.innerHTML = "";
    return;
  }

  const lines = text
    .replace(/\u00A0/g, " ")
    .replace(/\u2002/g, " ")
    .replace(/\u2003/g, " ")
    .split(/\n/)
    .map(line => line.replace(/\s+/g, " ").trim())
    .filter(line => line.length > 0);

  const records = [];

  for (let i = 0; i < lines.length; i++) {
    if (!/^QR/i.test(lines[i])) continue;

    const qcTrace = lines[i];
    const sectionLines = lines.slice(i + 1, i + 40);
    const section = sectionLines.join(" ");

    let material = "";
    let quantity = "";
    let supplier = "";
    let vendorLot = "";

    const materialMatch = section.match(/([A-Z0-9]+ - .*?)(?=\s+\d+\s+Units|\s+[\d,]+(\.\d+)?\s*\([A-Z]+\))/i);
    if (materialMatch) {
      material = materialMatch[1].trim();
    } else {
      const materialLine = sectionLines.find(line => line.includes(" - "));
      material = materialLine || "";
    }

    const qtyMatch = section.match(/[\d,]+(\.\d+)?\s*\([A-Z]+\)/i);
    if (qtyMatch) {
      quantity = qtyMatch[0].trim();
    }

    const supplierMatch = section.match(/\([A-Z]+\)\s+(.*?)(?=\s+\d{12}|\s+BP\d+|\s+\d{4}\/\d{2}\/\d{2})/i);
    if (supplierMatch) {
      supplier = supplierMatch[1].trim();
    } else {
      const qtyLineIndex = sectionLines.findIndex(line => /[\d,]+(\.\d+)?\s*\([A-Z]+\)/i.test(line));
      if (qtyLineIndex >= 0 && sectionLines[qtyLineIndex + 1]) {
        supplier = sectionLines[qtyLineIndex + 1];
      }
    }

    const lotMatch = section.match(/\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}\s+(.+?)(?=\s+QR|$)/i);
    if (lotMatch) {
      vendorLot = lotMatch[1].trim();
    } else {
      const dateIndex = sectionLines.findIndex(line => /^\d{4}\/\d{2}\/\d{2}/.test(line));
      if (dateIndex >= 0 && sectionLines[dateIndex + 1]) {
        vendorLot = sectionLines[dateIndex + 1];
      }
    }

    records.push([qcTrace, material, quantity, supplier, vendorLot]);
  }

  if (records.length === 0) {
    summary.innerHTML = "";
    return;
  }

  let table = `
    <table id="sampleTable">
      <tr>
        <th>QC TRACE</th>
        <th>MATERIAL</th>
        <th>RECEIVED QUANTITY</th>
        <th>SUPPLIER</th>
        <th>VENDOR LOT</th>
      </tr>
  `;

  records.forEach(row => {
    table += "<tr>";
    row.forEach(value => {
      table += `<td>${clean(value)}</td>`;
    });
    table += "</tr>";
  });

  table += "</table>";
  summary.innerHTML = table;
}

function copySummary() {
  const table = document.getElementById("sampleTable");

  if (!table) {
    showMessage("Paste details first");
    return;
  }

  const range = document.createRange();
  range.selectNode(table);

  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);

  document.execCommand("copy");
  selection.removeAllRanges();

  showMessage("Copied ✓");
}

function showMessage(text) {
  const msg = document.getElementById("copyMsg");
  msg.textContent = text;

  setTimeout(() => {
    msg.textContent = "";
  }, 2000);
}

function clearPage() {
  rawText.value = "";
  summary.innerHTML = "";
  showMessage("");
}

function clean(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
</script>

</body>
</html>
