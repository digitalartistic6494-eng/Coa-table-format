<!DOCTYPE html>
<html>
<head>
  <title>QC Trace Filter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    textarea {
      width: 100%;
      height: 250px;
      padding: 10px;
      font-size: 14px;
    }
    button {
      margin: 10px 5px 10px 0;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px;
      font-size: 13px;
      text-align: left;
    }
    th {
      background: #ddd;
    }
  </style>
</head>
<body>

<h2>QC Trace Data Filter</h2>

<p>Paste full sample received data below:</p>

<textarea id="inputData" placeholder="Paste data here..."></textarea>

<br>

<button onclick="filterData()">Filter 5 Columns</button>
<button onclick="copyTable()">Copy Output</button>

<div id="output"></div>

<script>
function filterData() {
  let text = document.getElementById("inputData").value;
  let lines = text.split(/\n/).map(x => x.trim()).filter(x => x !== "");

  let rows = [];

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith("QR")) {
      let qcTrace = lines[i];

      let material = "";
      let receivedQty = "";
      let supplier = "";
      let vendorLot = "";

      // Material usually after Status line
      for (let j = i + 1; j < Math.min(i + 20, lines.length); j++) {
        if (lines[j].includes(" - ")) {
          material = lines[j];
          break;
        }
      }

      // Received quantity like 110.0 (GAL), 20.0 (KG), 7,820.0 (PCS)
      for (let j = i + 1; j < Math.min(i + 20, lines.length); j++) {
        if (/^[\d,]+(\.\d+)?\s*\([A-Z]+\)$/.test(lines[j])) {
          receivedQty = lines[j];
          break;
        }
      }

      // Supplier usually after received quantity
      let qtyIndex = lines.indexOf(receivedQty);
      if (qtyIndex !== -1 && lines[qtyIndex + 1]) {
        supplier = lines[qtyIndex + 1];
      }

      // Vendor lot usually after scan date
      for (let j = i + 1; j < Math.min(i + 25, lines.length); j++) {
        if (/^\d{4}\/\d{2}\/\d{2}/.test(lines[j])) {
          vendorLot = lines[j + 1] || "";
          break;
        }
      }

      rows.push([qcTrace, material, receivedQty, supplier, vendorLot]);
    }
  }

  let html = `
    <table id="resultTable">
      <tr>
        <th>QC TRACE</th>
        <th>MATERIAL</th>
        <th>RECEIVED QUANTITY</th>
        <th>SUPPLIER</th>
        <th>VENDOR LOT</th>
      </tr>
  `;

  rows.forEach(row => {
    html += "<tr>" + row.map(col => `<td>${col}</td>`).join("") + "</tr>";
  });

  html += "</table>";

  document.getElementById("output").innerHTML = html;
}

function copyTable() {
  let table = document.getElementById("resultTable");
  if (!table) {
    alert("Please filter data first.");
    return;
  }

  let text = "";
  for (let row of table.rows) {
    let cells = Array.from(row.cells).map(cell => cell.innerText);
    text += cells.join("\t") + "\n";
  }

  navigator.clipboard.writeText(text);
  alert("Copied! You can paste into Excel.");
}
</script>

</body>
</html>
